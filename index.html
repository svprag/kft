<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SV PRAG - KFT 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- PWA Manifest inline -->
  <link rel="manifest"
    href="data:application/json,{%22name%22:%22Turnier+2025%22,%22short_name%22:%22Turnier%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231a1a2e%22,%22theme_color%22:%22%230f3460%22}">
  <meta name="theme-color" content="#0f3460">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Turnier">

  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --accent: #238636;
      --accent2: #1f6feb;
      --gold: #e3b341;
      --red: #da3633;
      --text: #e6edf3;
      --text2: #8b949e;
      --border: #30363d;
      --green-win: #196c2e;
      --green-win-text: #3fb950;
      --red-loss: #6e1a1a;
      --red-loss-text: #ff7b72;
      --draw: #3d3200;
      --draw-text: #d29922;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 0 80px;
    }

    /* HEADER */
    header {
      background: linear-gradient(180deg, #0f3460 0%, #0d1117 100%);
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
    }

    .last-update {
      font-size: 11px;
      color: var(--text2);
    }

    .live-badge {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.6
      }
    }

    /* NAV TABS */
    nav {
      display: flex;
      gap: 4px;
      padding: 12px 16px 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 8px 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent2);
    }

    .tab:hover:not(.active) {
      color: var(--text);
    }

    /* SECTIONS */
    .section {
      display: none;
      padding: 16px;
    }

    .section.active {
      display: block;
    }

    /* CARDS */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }

    .card-header h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text2);
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-field1 {
      background: rgba(31, 111, 235, 0.2);
      color: #79c0ff;
    }

    .badge-field2 {
      background: rgba(35, 134, 54, 0.2);
      color: #56d364;
    }

    .badge-ko {
      background: rgba(227, 179, 65, 0.2);
      color: var(--gold);
    }

    /* MATCH ROW */
    .match-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .match-row:last-child {
      border-bottom: none;
    }

    .team-home {
      text-align: right;
    }

    .team-away {
      text-align: left;
    }

    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .team-flag {
      font-size: 20px;
      min-height: 24px;
    }

    .match-score {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: center;
      min-width: 80px;
    }

    .score-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 800;
      min-width: 36px;
      text-align: center;
    }

    .score-divider {
      font-size: 14px;
      color: var(--text2);
    }

    .match-time {
      font-size: 11px;
      color: var(--text2);
      text-align: center;
    }

    .match-pending .score-box {
      color: var(--text2);
      font-size: 14px;
      font-weight: 600;
    }

    .match-played .score-box-home-win {
      background: rgba(35, 134, 54, 0.15);
      border-color: #238636;
      color: #56d364;
    }

    .match-played .score-box-away-win {
      background: rgba(218, 54, 51, 0.15);
      border-color: #da3633;
      color: #ff7b72;
    }

    /* STANDINGS TABLE */
    .standings-table {
      width: 100%;
      border-collapse: collapse;
    }

    .standings-table th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text2);
      padding: 8px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .standings-table th.team-col {
      text-align: left;
    }

    .standings-table td {
      padding: 9px 12px;
      text-align: center;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }

    .standings-table tr:last-child td {
      border-bottom: none;
    }

    .standings-table td.team-col {
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .pos-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--text2);
      width: 24px;
      display: inline-block;
      text-align: center;
    }

    .pos-q {
      color: var(--accent2);
    }

    .pos-ko {
      color: var(--gold);
    }

    .pts-cell {
      font-weight: 700;
      font-size: 16px;
    }

    .form-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 1px;
    }

    .form-w {
      background: #238636;
    }

    .form-d {
      background: #d29922;
    }

    .form-l {
      background: #da3633;
    }

    /* BRACKET / KO */
    .ko-round-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* SCHEDULE TAB */
    .schedule-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--bg3);
      border-color: var(--accent2);
      color: var(--text);
    }

    /* FIELD INDICATOR */
    .field-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text2);
      font-size: 14px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      background: rgba(218, 54, 51, 0.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 16px;
      color: var(--red-loss-text);
      font-size: 14px;
      margin: 16px 0;
    }

    /* NEXT MATCH HIGHLIGHT */
    .next-match-card {
      background: linear-gradient(135deg, rgba(31, 111, 235, 0.15) 0%, rgba(35, 134, 54, 0.1) 100%);
      border: 1px solid rgba(31, 111, 235, 0.5);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .next-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 10px;
    }

    /* SCROLL indicator for nav */
    nav {
      overflow-x: auto;
      scrollbar-width: none;
    }

    nav::-webkit-scrollbar {
      display: none;
    }

    /* CONFIG BANNER */
    .config-banner {
      background: rgba(227, 179, 65, 0.1);
      border: 1px solid rgba(227, 179, 65, 0.4);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 0 16px 16px;
      font-size: 13px;
      color: var(--gold);
      display: none;
    }

    .config-banner.visible {
      display: block;
    }

    /* ADMIN HINT */
    .admin-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
    }

    .admin-section h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 8px;
      font-family: 'Barlow', sans-serif;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent2);
    }

    button {
      padding: 8px 16px;
      background: var(--accent2);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    .info-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      margin-top: 8px;
    }

    .info-text code {
      font-family: monospace;
      font-size: 12px;
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 3px;
      color: #79c0ff;
    }

    @media (max-width: 480px) {
      .team-name {
        font-size: 14px;
      }

      .score-box {
        font-size: 18px;
        padding: 4px 7px;
        min-width: 30px;
      }

      .standings-table th,
      .standings-table td {
        padding: 7px 6px;
      }
    }

    .sponsor-card {
      background: #fff;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 70px;
      transition: border-color 0.2s;
    }

    .sponsor-card:hover {
      border-color: #1f6feb;
    }

    .sponsor-card img {
      max-width: 100%;
      max-height: 50px;
      width: auto;
      object-fit: contain;
    }

    .sponsor-text-card {
      flex-direction: column;
      gap: 0;
    }
  </style>
</head>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    let SHEET_ID = localStorage.getItem('turnier_sheet_id') || '19AAZoyS_AON0OE3K1e1erVyteMHo_cLN';
    let tournamentData = { matches: [], teams: [] };
    let activeFilter = 'alle';

    // ============================================================
    // INIT
    // ============================================================
    window.addEventListener('load', () => {
      if (SHEET_ID) {
        const input = document.getElementById('sheet-id-input');
        if (input) input.value = SHEET_ID;
        fetchSheetData();
      } else {
        const banner = document.getElementById('config-banner');
        if (banner) banner.classList.add('visible');
        loadDemoData();
      }
      setInterval(() => {
        if (SHEET_ID) fetchSheetData();
      }, 60000);
    });

    // ============================================================
    // GOOGLE SHEETS FETCH (CSV approach - no API key needed)
    // ============================================================
    async function fetchSheetData() {
      try {
        const [matchesCSV, teamsCSV] = await Promise.all([
          fetchCSV(SHEET_ID, 'Spiele'),
          fetchCSV(SHEET_ID, 'Mannschaften')
        ]);
        tournamentData.matches = parseCSV(matchesCSV, ['SpielID', 'Runde', 'Gruppe', 'Platz', 'Uhrzeit', 'Team1', 'Team2', 'Tore1', 'Tore2', 'Status']);
        tournamentData.teams = parseCSV(teamsCSV, ['StartNr', 'Name', 'Gruppe', 'Emoji']);
        updateLastUpdate();
        renderAll();

      } catch (e) {

      }
    }

    async function fetchCSV(sheetId, sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('fetch failed');
      return res.text();
    }

    function parseCSV(csv, headers) {
      const lines = csv.trim().split('\n').slice(1); // skip header row
      return lines.map(line => {
        const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim();
        });
        return obj;
      }).filter(r => r[headers[0]]);
    }

    function saveSheetId() {
      const input = document.getElementById('sheet-id-input');
      if (!input) return;
      const val = input.value.trim();
      if (!val) return;
      SHEET_ID = val;
      localStorage.setItem('turnier_sheet_id', val);

    // ============================================================
    // SPIELPLAN
    // ============================================================
    function renderSpielplan() {
      const matches = tournamentData.matches;
      const rounds = ['alle', ...new Set(matches.map(m => m.Runde))];
      const fields = ['Alle Plätze', 'Platz 1', 'Platz 2'];

      // Filter buttons
      const filterEl = document.getElementById('schedule-filter');
      filterEl.innerHTML = '';
      ['alle', 'Gruppe', 'Achtelfinale', 'Viertelfinale', 'Halbfinale', 'Spiel um Platz 3', 'Finale'].forEach(r => {
        if (!matches.find(m => m.Runde === r) && r !== 'alle') return;
        const btn = document.createElement('div');
        btn.className = 'filter-btn' + (activeFilter === r ? ' active' : '');
        btn.textContent = r === 'alle' ? 'Alle' : r;
        btn.onclick = () => { activeFilter = r; renderSpielplan(); };
        filterEl.appendChild(btn);
      });

      const filtered = activeFilter === 'alle' ? matches : matches.filter(m => m.Runde === activeFilter);
      const container = document.getElementById('spielplan-content');

      if (!filtered.length) { container.innerHTML = '<div class="loading">Keine Spiele gefunden</div>'; return; }

      // Find next upcoming matches (2)
      const nextMatches = matches.filter(m => m.Status === 'geplant' || m.Status === 'läuft').slice(0, 2);

      // Group by date
      const byDate = {};
      filtered.forEach(m => {
        const key = '14. Mai 2026';
        if (!byDate[key]) byDate[key] = [];
        byDate[key].push(m);
      });

      let html = '';

      // Next matches highlight
      if (nextMatches.length && activeFilter === 'alle') {
        const anyLive = nextMatches.some(m => m.Status === 'läuft');
        html += `<div class="next-match-card">
      <div class="next-label">${anyLive ? '⚽ Läuft gerade' : '⏱ Nächste Spiele'}</div>`;
        nextMatches.forEach((nextMatch, idx) => {
          html += `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;${idx > 0 ? 'margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);' : ''}">
        <div style="text-align:right;flex:1;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;">${nextMatch.Team1}</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text2);">${nextMatch.Uhrzeit} Uhr</div>
          <div style="font-size:11px;margin-top:4px;" class="field-tag ${nextMatch.Platz === 'Platz 1' ? 'badge-field1' : 'badge-field2'}">${nextMatch.Platz}</div>
        </div>
        <div style="text-align:left;flex:1;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;">${nextMatch.Team2}</div>
        </div>
      </div>`;
        });
        html += `</div>`;
      }

      Object.entries(byDate).forEach(([date, dayMatches]) => {
        html += `<div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);">${date}</div>`;
        html += '<div class="card">';
        dayMatches.forEach((m, i) => {
          html += renderMatchRow(m);
        });
        html += '</div>';
      });

      container.innerHTML = html;
    }

    function renderMatchRow(m) {
      const t1 = getTeam(m.Team1), t2 = getTeam(m.Team2);
      const played = m.Status === 'beendet';
      const g1 = parseInt(m.Tore1), g2 = parseInt(m.Tore2);
      const homeWin = played && g1 > g2;
      const awayWin = played && g2 > g1;
      const fieldClass = m.Platz === 'Platz 1' ? 'badge-field1' : 'badge-field2';

      return `<div class="match-row ${played ? 'match-played' : 'match-pending'}">
    <div class="team-home">
      <div class="team-name">${m.Team1}</div>
    </div>
    <div class="match-score">
      <div>
        <div style="display:flex;align-items:center;gap:4px;justify-content:center;">
          <div class="score-box ${played && homeWin ? 'score-box-home-win' : played && awayWin ? '' : ''}">${played ? m.Tore1 : m.Uhrzeit}</div>
          ${played ? `<span class="score-divider">:</span><div class="score-box ${played && awayWin ? 'score-box-away-win' : ''}">${m.Tore2}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px;">
          <span class="field-tag ${fieldClass}">${m.Platz}</span>
          ${m.Runde !== 'Gruppe' ? `<span class="badge badge-ko" style="font-size:9px;">${m.Runde}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="team-away">
      <div class="team-name">${m.Team2}</div>
    </div>
  </div>`;
    }

    // ============================================================
    // GRUPPEN
    // ============================================================
    function renderGruppen() {
      const groups = ['A', 'B', 'C', 'D', 'E', 'F'];
      let html = '';

      // Determine which third-placed teams qualify (best 4)
      const qualifiedThirds = getQualifiedThirdPlaced();

      groups.forEach(g => {
        const teams = tournamentData.teams.filter(t => t.Gruppe === g);
        if (!teams.length) return;
        const standings = calcStandings(g);
        const thirdQualifies = qualifiedThirds.includes(g);

        html += `<div class="card">
      <div class="card-header">
        <h3>Gruppe ${g}</h3>
        <span style="font-size:11px;color:var(--text2);">SP · G · U · V · Tore · Pkt</span>
      </div>
      <table class="standings-table">
        <tbody>`;

        standings.forEach((s, i) => {
          const team = getTeam(s.name);
          const isQualifiedThird = i === 2 && thirdQualifies;
          const posClass = i < 2 ? 'pos-q' : (isQualifiedThird ? 'pos-ko' : '');
          html += `<tr>
        <td style="width:28px;"><span class="pos-num ${posClass}">${i + 1}</span></td>
        <td class="team-col">${s.name}</td>
        <td>${s.sp}</td>
        <td>${s.g}</td>
        <td>${s.u}</td>
        <td>${s.v}</td>
        <td style="font-size:12px;">${s.tf}:${s.ta}</td>
        <td class="pts-cell" style="color:${i < 2 ? 'var(--green-win-text)' : isQualifiedThird ? 'var(--gold)' : 'var(--text)'}">${s.pts}</td>
      </tr>`;
        });

        html += `</tbody></table>
      <div style="padding:8px 12px;font-size:11px;color:var(--text2);display:flex;gap:12px;">
        <span><span style="color:var(--green-win-text)">●</span> Achtelfinale direkt</span>
        <span><span style="color:var(--gold)">◐</span> Bester Dritter</span>
      </div>
    </div>`;
      });

      document.getElementById('gruppen-content').innerHTML = html || '<div class="loading">Keine Gruppenspiele gefunden</div>';
    }

    function getQualifiedThirdPlaced() {
      const groups = ['A', 'B', 'C', 'D', 'E', 'F'];
      const thirdPlaced = [];
      groups.forEach(g => {
        const st = calcStandings(g);
        if (st.length >= 3 && st[0].sp > 0) {
          thirdPlaced.push({ ...st[2], gruppe: g });
        }
      });
      thirdPlaced.sort((a, b) => b.pts - a.pts || (b.tf - b.ta) - (a.tf - a.ta) || b.tf - a.tf);
      return thirdPlaced.slice(0, 4).map(t => t.gruppe);
    }

    function calcStandings(group) {
      const teams = tournamentData.teams.filter(t => t.Gruppe === group).map(t => t.Name);
      const stats = {};
      teams.forEach(t => { stats[t] = { name: t, sp: 0, g: 0, u: 0, v: 0, tf: 0, ta: 0, pts: 0 }; });

      tournamentData.matches
        .filter(m => m.Runde === 'Gruppe' && m.Gruppe === group && m.Status === 'beendet')
        .forEach(m => {
          const g1 = parseInt(m.Tore1) || 0, g2 = parseInt(m.Tore2) || 0;
          if (!stats[m.Team1] || !stats[m.Team2]) return;
          stats[m.Team1].sp++; stats[m.Team2].sp++;
          stats[m.Team1].tf += g1; stats[m.Team1].ta += g2;
          stats[m.Team2].tf += g2; stats[m.Team2].ta += g1;
          if (g1 > g2) { stats[m.Team1].g++; stats[m.Team1].pts += 3; stats[m.Team2].v++; }
          else if (g2 > g1) { stats[m.Team2].g++; stats[m.Team2].pts += 3; stats[m.Team1].v++; }
          else { stats[m.Team1].u++; stats[m.Team1].pts++; stats[m.Team2].u++; stats[m.Team2].pts++; }
        });

      return Object.values(stats).sort((a, b) => b.pts - a.pts || (b.tf - b.ta) - (a.tf - a.ta) || b.tf - a.tf);
    }

    // ============================================================
    // BEST THIRD-PLACED TEAMS (like Euro 2024)
    // ============================================================
    function resolveKOTeams() {
      const groups = ['A', 'B', 'C', 'D', 'E', 'F'];
      const groupResults = {};
      groups.forEach(g => {
        groupResults[g] = calcStandings(g);
      });

      // Restore original team names before resolving (for repeated calls)
      const koMatches = tournamentData.matches.filter(m => m.Runde !== 'Gruppe');
      koMatches.forEach(m => {
        if (!m._origTeam1) m._origTeam1 = m.Team1;
        if (!m._origTeam2) m._origTeam2 = m.Team2;
        m.Team1 = m._origTeam1;
        m.Team2 = m._origTeam2;
      });

      // Build resolution map: only resolve when ALL group matches are completed
      const resolveMap = {};
      groups.forEach(g => {
        const groupMatches = tournamentData.matches.filter(m => m.Runde === 'Gruppe' && m.Gruppe === g);
        const allCompleted = groupMatches.length > 0 && groupMatches.every(m => m.Status === 'beendet');
        if (!allCompleted) return;
        const st = groupResults[g];
        if (st.length >= 1) resolveMap[`Sieger ${g}1`] = st[0].name;
        if (st.length >= 2) resolveMap[`Sieger ${g}2`] = st[1].name;
      });

      // Collect third-placed teams (only from fully completed groups)
      const thirdPlaced = [];
      groups.forEach(g => {
        const groupMatches = tournamentData.matches.filter(m => m.Runde === 'Gruppe' && m.Gruppe === g);
        const allCompleted = groupMatches.length > 0 && groupMatches.every(m => m.Status === 'beendet');
        if (!allCompleted) return;
        const st = groupResults[g];
        if (st.length >= 3) {
          thirdPlaced.push({ ...st[2], gruppe: g });
        }
      });

      // Sort third-placed: points > goal diff > goals scored
      thirdPlaced.sort((a, b) => b.pts - a.pts || (b.tf - b.ta) - (a.tf - a.ta) || b.tf - a.tf);

      // Map the 4 best third-placed
      if (thirdPlaced.length >= 4) {
        resolveMap['1.Bester Dritter'] = thirdPlaced[0].name;
        resolveMap['2.Bester Dritter'] = thirdPlaced[1].name;
        resolveMap['3.Bester Dritter'] = thirdPlaced[2].name;
        resolveMap['4.Bester Dritter'] = thirdPlaced[3].name;
      }

      // Resolve KO match references (Achtelfinale -> Viertelfinale -> ...)

      // Build results map for KO: SpielID -> winner/loser
      const matchResults = {};
      koMatches.forEach(m => {
        if (m.Status === 'beendet') {
          const g1 = parseInt(m.Tore1) || 0, g2 = parseInt(m.Tore2) || 0;
          matchResults[m.SpielID] = {
            winner: g1 >= g2 ? m.Team1 : m.Team2,
            loser: g1 >= g2 ? m.Team2 : m.Team1
          };
        }
      });

      // Resolve team names in KO matches
      koMatches.forEach(m => {
        // Resolve from group results
        if (resolveMap[m.Team1]) m.Team1 = resolveMap[m.Team1];
        if (resolveMap[m.Team2]) m.Team2 = resolveMap[m.Team2];

        // Resolve from previous KO results: "Sieger AF37" -> winner of match 37
        const siegerMatch1 = m.Team1.match(/^Sieger (AF|VF|HF)(\d+)$/);
        if (siegerMatch1) {
          const res = matchResults[siegerMatch1[2]];
          if (res) m.Team1 = res.winner;
        }
        const siegerMatch2 = m.Team2.match(/^Sieger (AF|VF|HF)(\d+)$/);
        if (siegerMatch2) {
          const res = matchResults[siegerMatch2[2]];
          if (res) m.Team2 = res.winner;
        }

        // Resolve losers: "Verlierer HF49"
        const verliererMatch1 = m.Team1.match(/^Verlierer (AF|VF|HF)(\d+)$/);
        if (verliererMatch1) {
          const res = matchResults[verliererMatch1[2]];
          if (res) m.Team1 = res.loser;
        }
        const verliererMatch2 = m.Team2.match(/^Verlierer (AF|VF|HF)(\d+)$/);
        if (verliererMatch2) {
          const res = matchResults[verliererMatch2[2]];
          if (res) m.Team2 = res.loser;
        }
      });
    }

    // ============================================================
    // K.O. RUNDE
    // ============================================================
    function renderKO() {
      const rounds = ['Achtelfinale', 'Viertelfinale', 'Halbfinale', 'Spiel um Platz 3', 'Finale'];
      let html = '';

      rounds.forEach(round => {
        const matches = tournamentData.matches.filter(m => m.Runde === round);
        if (!matches.length) return;

        html += `<div class="ko-round-title">${round}</div>`;
        html += '<div class="card">';
        matches.forEach(m => { html += renderMatchRow(m); });
        html += '</div>';
      });

      document.getElementById('ko-content').innerHTML = html || '<div class="loading">K.O.-Runde noch nicht gestartet</div>';
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function getTeam(name) {
      return tournamentData.teams.find(t => t.Name === name) || { Name: name, Gruppe: '', Emoji: '' };
    }

    function showTab(tab, evt) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      const clickedTab = (evt && evt.target) || (typeof event !== 'undefined' && event.target);
      if (clickedTab) clickedTab.classList.add('active');
    }

      [2015, '4 Maß ond a Göggele'], [2016, 'H.I.C. Habitat Felicitas'], [2017, 'H.I.C. Habitat Felicitas'],

    (function renderSieger() {
      const tbody = document.getElementById('sieger-table');
      if (!tbody) return;
      const noTurnier = (s) => s.startsWith('kein');
      [...siegerData].reverse().forEach(([year, winner]) => {
        const tr = document.createElement('tr');
        const hasWinner = !noTurnier(winner);
        tr.innerHTML = `
      <td style="width:28px;padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#8b949e;border-bottom:1px solid #30363d;">${year}</td>
      <td style="padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:${hasWinner ? '17' : '15'}px;font-weight:${hasWinner ? '700' : '600'};color:${hasWinner ? '#e6edf3' : '#484f58'};border-bottom:1px solid #30363d;${!hasWinner ? 'font-style:italic;' : ''}">${hasWinner ? '🏆 ' : ''}${winner}</td>`;
        tbody.appendChild(tr);
      });
    })();
  </script>
